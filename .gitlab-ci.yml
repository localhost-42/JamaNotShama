stages:
  - test
  - build
  - push
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
    - when: never

variables:
  DOCKER_TLS_CERTDIR: ""
  SERVER_USER: "ubuntu"
  APP_PORT: "5000"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/app"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# TEST
test:front:
  stage: test
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-front"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm test --if-present

# BUILD
build:artifacts:
  stage: build
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-build"
    paths:
      - frontend/node_modules/
      - backend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
    - cd ../backend
    - npm ci
    - npm run build
    - cd ..
  artifacts:
    expire_in: 1 hour
    paths:
      - frontend/dist/
      - frontend/build/
      - backend/dist/

# PUSH (build docker image)
push:image:
  stage: push
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1460"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs: ["build:artifacts"]
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"

# DEPLOY
deploy:prod:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs: ["push:image"]
  script:
    - set -euxo pipefail
    - apk add --no-cache openssh-client
    - echo "SERVER_IP=[$SERVER_IP] SERVER_PORT=[$SERVER_PORT] SERVER_USER=[$SERVER_USER]"
    - test -n "${SERVER_IP:-}" || (echo "Missing SERVER_IP" && exit 1)
    - test -n "${SERVER_PORT:-}" || (echo "Missing SERVER_PORT" && exit 1)
    - test -n "${SSH_PRIVATE_KEY:-}" || (echo "Missing SSH_PRIVATE_KEY" && exit 1)

    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    # לא נתקעים פה: timeout + לוגים
    - echo "==> ssh-keyscan..."
    - ssh-keyscan -T 10 -p "$SERVER_PORT" "$SERVER_IP" | tee -a ~/.ssh/known_hosts

    - echo "==> SSH connectivity test..."
    - ssh -o BatchMode=yes -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" "echo connected && docker --version"

    - echo "==> Deploying image $IMAGE_NAME:$IMAGE_TAG ..."
    - |
      ssh -tt -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" << 'EOSSH'
      set -euxo pipefail
      echo "==> docker login"
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

      echo "==> docker pull"
      docker pull "$IMAGE_NAME:$IMAGE_TAG"

      echo "==> stop/remove old container (if exists)"
      docker stop jns-app || true
      docker rm jns-app || true

      echo "==> run new container"
      docker run -d \
        --name jns-app \
        --restart unless-stopped \
        -p 3000:"$APP_PORT" \
        -e NODE_ENV=production \
        "$IMAGE_NAME:$IMAGE_TAG"

      echo "==> show status"
      docker ps --filter "name=jns-app"
      docker logs --tail 80 jns-app || true
      EOSSH
