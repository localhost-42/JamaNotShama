# CI CD BY YOAV SL ALPACA!!!!!!!!!!
stages:
  - test
  - build
  - push
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
    - when: never

variables:
  DOCKER_TLS_CERTDIR: ""
  SERVER_USER: "ubuntu"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/app"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# TEST
test:front:
  stage: test
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-front"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm test --if-present

# BUILD
build:artifacts:
  stage: build
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-build"
    paths:
      - frontend/node_modules/
      - backend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
    - cd ../backend
    - npm ci
    - npm run build
    - cd ..
  artifacts:
    expire_in: 1 hour
    paths:
      - frontend/dist/
      - frontend/build/
      - backend/dist/

# PUSH (build docker image)
push:image:
  stage: push
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1460"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs: ["build:artifacts"]
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"

# DEPLOY
deploy:prod:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs: ["push:image"]
  script:
    # בלי -x כדי לא להדליף מפתחות/סיסמאות
    - set -euo pipefail

    - apk add --no-cache openssh-client

    - echo "SERVER_IP=[$SERVER_IP] SSH_PORT=[$SERVER_PORT] SERVER_USER=[$SERVER_USER] APP_PORT=[$APP_PORT] PUBLIC_PORT=[3000]"
    - test -n "${SERVER_IP:-}" || (echo "Missing SERVER_IP" && exit 1)
    - test -n "${SERVER_PORT:-}" || (echo "Missing SERVER_PORT (SSH port, usually 22)" && exit 1)
    - test -n "${SERVER_USER:-}" || (echo "Missing SERVER_USER" && exit 1)
    - test -n "${SSH_PRIVATE_KEY:-}" || (echo "Missing SSH_PRIVATE_KEY" && exit 1)

    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    - echo "==> ssh-keyscan (timeout 10s)..."
    - ssh-keyscan -T 10 -p "$SERVER_PORT" "$SERVER_IP" >> ~/.ssh/known_hosts

    - echo "==> SSH connectivity test..."
    - ssh -o BatchMode=yes -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" "echo connected && docker --version"

    - echo "==> Deploying $IMAGE_NAME:$IMAGE_TAG ..."
    - |
      ssh -o BatchMode=yes -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" \
       bash -lc '
         set -euo pipefail

         echo \"==> docker login\"
         echo \"\$CI_REGISTRY_PASSWORD\" | docker login -u \"\$CI_REGISTRY_USER\" --password-stdin \"\$CI_REGISTRY\"

         echo \"==> docker pull\"
         docker pull \"\$IMAGE_NAME:\$IMAGE_TAG\"

         echo \"==> stop/remove old container\"
         docker stop jns-app || true
         docker rm jns-app || true

         echo \"==> run new container\"
         docker run -d \
           --name jns-app --network \$DOCKER_NETWORK \
           --restart unless-stopped \
           -p 127.0.0.1:\$APP_PORT:\$APP_PORT \
           -e NODE_ENV=production \
           \"\$IMAGE_NAME:\$IMAGE_TAG\"

         echo \"==> status + last logs\"
         docker ps --filter name=jns-app
         docker logs --tail 120 jns-app || true
       '"
