# OH THE GOD OF CI CD! PLSSS! MAKE THAT COUNT!
stages:
  - test
  - build
  - push
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: always
    - when: never

variables:
  DOCKER_TLS_CERTDIR: ""
  SERVER_USER: "ubuntu"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/app"
  IMAGE_TAG: "$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"

.default_branch_rules:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "dev"'

test:front:
  stage: test
  image: node:20
  extends: .default_branch_rules
  cache:
    key: "$CI_COMMIT_REF_SLUG-front"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm test --if-present

build:artifacts:
  stage: build
  image: node:20
  extends: .default_branch_rules
  cache:
    key: "$CI_COMMIT_REF_SLUG-build"
    paths:
      - frontend/node_modules/
      - backend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
    - cd ../backend
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 hour
    paths:
      - frontend/dist/
      - frontend/build/
      - backend/dist/

push:image:
  stage: push
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1460"]
  extends: .default_branch_rules
  needs:
    - build:artifacts
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"

.deploy_template:
  stage: deploy
  image: alpine:3.20
  needs:
    - push:image
  before_script:
    - set -eu
    - apk add --no-cache openssh-client bash
    - test -n "${SERVER_IP:-}" || { echo "Missing SERVER_IP"; exit 1; }
    - test -n "${SERVER_PORT:-}" || { echo "Missing SERVER_PORT"; exit 1; }
    - test -n "${SERVER_USER:-}" || { echo "Missing SERVER_USER"; exit 1; }
    - test -n "${SSH_PRIVATE_KEY:-}" || { echo "Missing SSH_PRIVATE_KEY"; exit 1; }
    - test -n "${APP_PORT:-}" || { echo "Missing APP_PORT"; exit 1; }
    - test -n "${DOCKER_NETWORK:-}" || { echo "Missing DOCKER_NETWORK"; exit 1; }
    - test -n "${APP_PORT_EXTERNAL:-}" || { echo "Missing APP_PORT_EXTERNAL"; exit 1; }
    - test -n "${DB_HOST:-}" || { echo "Missing DB_HOST"; exit 1; }
    - test -n "${DB_PORT:-}" || { echo "Missing DB_PORT"; exit 1; }
    - test -n "${DB_USER:-}" || { echo "Missing DB_USER"; exit 1; }
    - test -n "${DB_PASSWORD:-}" || { echo "Missing DB_PASSWORD"; exit 1; }
    - test -n "${DB_NAME:-}" || { echo "Missing DB_NAME"; exit 1; }
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -T 10 -p "$SERVER_PORT" "$SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o BatchMode=yes -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" "
        set -e
        echo '$CI_REGISTRY_PASSWORD' | docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY'
        docker pull '$IMAGE_NAME:$IMAGE_TAG'
        docker stop '$CONTAINER_NAME' || true
        docker rm '$CONTAINER_NAME' || true
        docker run -d \
          --name "$CONTAINER_NAME" \
          --network "$DOCKER_NETWORK" \
          --restart unless-stopped \
          -p $APP_PORT_EXTERNAL:$APP_PORT \
          -e NODE_ENV="$NODE_ENV" \
          -e APP_PORT="$APP_PORT" \
          -e DB_HOST="$DB_HOST" \
          -e DB_PORT="$DB_PORT" \
          -e DB_USER="$DB_USER" \
          -e DB_PASSWORD="$DB_PASSWORD" \
          -e DB_NAME="$DB_NAME" \
          "$IMAGE_NAME:$IMAGE_TAG"
        docker ps --filter name='$CONTAINER_NAME'
        docker logs --tail 80 '$CONTAINER_NAME' || true
      "

deploy:prod:
  extends: .deploy_template
  environment:
    name: production
  variables:
    NODE_ENV: "production"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy:dev:
  extends: .deploy_template
  environment:
    name: development
  variables:
    NODE_ENV: "development"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
